version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 1
    labels: [dependencies, automated]
    commit-message:
      prefix: chore
      include: scope
    groups:
      all-npm-dependencies:
        patterns:
          - "*"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 1
    labels: [dependencies, automated, actions]
    groups:
      all-github-actions-dependencies:
        patterns:
          - "*"
